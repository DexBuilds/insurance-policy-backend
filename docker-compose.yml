version: '3.8'

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: insurance-db-sql
    ports:
      - "1433:1433"
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=Contraseña123@
      - MSSQL_PID=Developer
    volumes:
      - sql_data:/var/opt/mssql
  redis:
    image: redis:alpine
    container_name: insurance_redis
    ports:
      - "6379:6379"
    restart: always

volumes:
  sql_data: